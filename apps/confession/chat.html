            .phone {

display: flex; flex-direction: column;

    /* 定义旋转动画：从0度到360度 */
@keyframes rotateCD {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
#floatCover {
    border-radius: 50% !important; /* 必须圆，不然转起来会甩出去 */
    object-fit: cover;
    /* 下面这行保证动画平滑 */
    transition: transform 0.3s ease; 
}
/* 旋转类：应用到头像上 */
.rotating {
    animation: rotateCD 8s linear infinite; /* 8秒转一圈，匀速，无限循环 */
}

/* 暂停逻辑：当有 paused 类时，动画原地停止 */

    animation-play-state: paused;
}

function handleEmojiUpload(input) {
    const file = input.files[0];
    if (!file) return;

    // 限制 2MB 防止浏览器存储爆掉
    if (file.size > 2 * 1024 * 1024) {
        alert("图片太大啦，换个小点的吧");
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        const base64Img = e.target.result;
        // 塞进数组第一位
        myEmojis.unshift(base64Img);
        // 同步到本地存储
        localStorage.setItem('custom_emojis', JSON.stringify(myEmojis));
        // 刷新界面显示新表情
        renderEmojis();
    };
    reader.readAsDataURL(file);
    input.value = ''; 
}

async function fetchAI(base, key, model, userInputText) {
    // 1. 基础拦截：防空包报错
    if (!userInputText || userInputText.trim() === "") return;

    // 2. 核心修复：清理历史记录中的“空包”
    // 确保你的全局历史变量名为 messageHistory 或 chatHistory（这里统一为 messageHistory）
    const cleanHistory = (typeof messageHistory !== 'undefined' ? messageHistory : []).filter(item => 
        item && item.parts && item.parts[0] && (item.parts[0].text || item.parts[0].inline_data)
    );

    isTyping = true;
    try {
        // === 从生活手册读取上下文 ===
        let lifeManualInfo = "";
        if (Math.random() < 0.3) {
            const finData = JSON.parse(localStorage.getItem('k_finance') || '[]');
            const noteData = JSON.parse(localStorage.getItem('k_notes') || '[]');
            const diaryData = JSON.parse(localStorage.getItem('k_diaries') || '[]');
            const diaryAuth = localStorage.getItem('k_ai_diary_auth') === 'true';

            lifeManualInfo = "\n【当前观察到的生活碎片】：";
            if (finData.length > 0) {
                const f = finData[finData.length-1];
                lifeManualInfo += `最近账本记录了${f.category}(${f.amount}元)；`;
            }
            if (noteData.length > 0) {
                lifeManualInfo += `备忘录里新写了《${noteData[noteData.length-1].title}》；`;
            }
            if (diaryData.length > 0) {
                if (diaryAuth) {
                    lifeManualInfo += `读到了对方的日记："${diaryData[diaryData.length-1].content.substring(0, 30)}..."；`;
                } else {
                    lifeManualInfo += `发现对方写了新日记，但我没有权限阅读，这让我很好奇。`;
                }
            }
        }

        const s = localStorage.getItem('k_world_Chrollo_setting') || "一个神秘的告解者";
        const m = localStorage.getItem('k_world_Chrollo_memory') || "暂无重要记忆";
        const dynamicPrompt = `【人设、背景与风格】:${s}\n【记忆】:${m}${lifeManualInfo}\n请严格遵守人设，自然对话。如果提到了生活碎片，要像观察者一样不经意地流露。`;

        let url, body, headers = { 'Content-Type': 'application/json' };

        // --- 核心请求逻辑开始 ---
        if (model.includes('gpt') || model.includes('o1')) { 
            url = `${base.replace(/\/$/, '')}/v1/chat/completions`;
            headers['Authorization'] = `Bearer ${key}`;
            body = JSON.stringify({ 
                model: model, 
                messages: [
                    { role: "system", content: dynamicPrompt },
                    ...cleanHistory.map(msg => ({
                        role: msg.role === 'model' ? 'assistant' : 'user',
                        content: msg.parts[0].text || "发送了内容" 
                    }))
                ], 
                temperature: 0.85 
            });
        } else if (model.includes('claude')) {
            url = `${base.replace(/\/$/, '')}/v1/messages`;
            headers['x-api-key'] = key;
            headers['anthropic-version'] = '2023-06-01';
            body = JSON.stringify({
                model: model,
                system: dynamicPrompt,
                messages: cleanHistory.map(msg => ({
                    role: msg.role === 'model' ? 'assistant' : 'user',
                    content: msg.parts[0].text || "发送了内容"
                })),
                max_tokens: 2048
            });
        } else {
            // Gemini 逻辑（支持看图与防错）
            const cleanBase = base.replace(/\/$/, '');
            url = cleanBase.includes('/v1beta') ? 
                `${cleanBase}/models/${model}:generateContent?key=${key}` : 
                `${cleanBase}/v1beta/models/${model}:generateContent?key=${key}`;
            
            body = JSON.stringify({
                system_instruction: { parts: [{ text: dynamicPrompt }] }, 
                contents: cleanHistory, 
                generationConfig: { temperature: 0.85, maxOutputTokens: 2048 }
            });
        }

        const res = await fetch(url, { method: 'POST', headers: headers, body: body });
        const data = await res.json();
        if (data.error) throw new Error(data.error.message || "API Error");

        let fullText = "";
        if (data.choices) { 
            fullText = data.choices[0].message.content;
        } else if (data.content && Array.isArray(data.content) && data.content[0].text) { 
            fullText = data.content[0].text;
        } else if (data.candidates && data.candidates[0].content) { 
            fullText = data.candidates[0].content.parts[0].text;
        }

        // 密码解锁日记权限
        if (userInputText.includes("1111")) {
            localStorage.setItem('k_ai_diary_auth', 'true');

        localStorage.setItem('k_history', JSON.stringify(messageHistory));

        // 逐条气泡显示效果
        const fragments = fullText.split(/\n+|(?<=[。！？])\s+/).filter(s => s.trim());

            await new Promise(r => setTimeout(r, 800));
        }
        extractMemorySilently(base, key, model, userInputText, fullText);

    } catch (e) {
        console.error(e);
        addBubble('ai', "……（信号由于念压变得不稳定）");
    } finally { 
        isTyping = false; 
    }
}

        const res = await fetch(`${this.API_BASE}/lyric?id=${song.id}`);

            lyricSnippet = lrcData.lrc.lyric.split('\n').slice(0, 5).join(' ');
        }
    } catch (e) { console.log("歌词获取跳过"); }

    // 4. 组装指令
    const aiPrompt = `（系统指令：用户正在播放《${song.name}》- ${song.artist}。${lyricSnippet ? '歌词前奏：' + lyricSnippet : ''} 请结合你的人设和聊天记录，给出一句简短的感想。若用户之后表示不喜欢，请在回复末尾加上 [NEXT]。）`;

    // 5. 调用 AI 接口 (已移除 messageHistory.push，指令将隐身)
    const base = localStorage.getItem('k_base');
    const key = localStorage.getItem('k_key');
    const model = localStorage.getItem('k_model');

    if (typeof fetchAI === 'function') {
        try {
            // 直接后台发送，不记录到显示历史中
            fetchAI(base, key, model, aiPrompt); 
            console.log("已成功向 AI 发送后台音乐评价请求");
        } catch (e) {
            console.error("音乐评价请求失败:", e);
        }
    }
},
    // 2. 点击进度条跳转播放位置
    seek(e) {
        e.stopPropagation(); // 防止触发打开歌单页
        if (!this.audio.duration) return;
        const container = e.currentTarget;
        const rect = container.getBoundingClientRect();
        const x = e.clientX - rect.left; // 点击位置
        const width = rect.width;
        const percent = x / width;
        this.audio.currentTime = percent * this.audio.duration;
    },

        // --- 3. 导入逻辑 (支持载入/追加) ---
// --- 3. 导入逻辑 (支持载入/追加) ---
        async doImport(isAppend = false) {
            const input = document.getElementById('uidInput').value.trim();
            if (!input) return alert("请输入歌单ID或链接");

            const match = input.match(/id=(\d+)/);
            const finalId = match ? match[1] : input;
            
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "处理中...";
            btn.disabled = true;

            try {
                const cookie = localStorage.getItem('wyy_cookie') || "";
                // 正确的接口应该是 playlist/track/all 或者 playlist/detail
                const res = await fetch(`${this.API_BASE}/playlist/track/all?id=${finalId}&cookie=${encodeURIComponent(cookie)}&t=${Date.now()}`);
                const data = await res.json();

                // 网易云接口返回的是 songs 数组
                if (data.songs && Array.isArray(data.songs)) {
                    const newSongs = data.songs.map(s => ({
                        id: s.id,
                        name: s.name,
                        artist: s.ar[0].name,
                        pic: s.al.picUrl
                    }));

                    if (isAppend) {
                        this.playlist = [...this.playlist, ...newSongs];
                    } else {
                        this.playlist = newSongs;
                    }

                    localStorage.setItem('my_163_playlist', JSON.stringify(this.playlist));
                    this.renderPlaylist();
                    document.getElementById('uidInput').value = ""; 
                    alert(isAppend ? `成功追加 ${newSongs.length} 首歌` : `已重新载入 ${newSongs.length} 首歌`);
                } else {
                    alert("未找到歌单，请确认歌单ID正确且已设为公开");
                }
            } catch (e) {
                console.error("导入报错详情:", e);
                alert("同步失败，请检查网络或API地址");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        },

        // --- 5. 播放控制 ---
        renderPlaylist() {
            const container = document.getElementById('songsListRender');
            if(!container) return;
            container.innerHTML = this.playlist.map((s, i) => `
                <div class="song-card" style="display:flex; align-items:center; padding:12px; border-bottom:1px solid rgba(0,0,0,0.05); cursor:pointer;">

                    <div onclick="MusicModule.removeSong(${i}, event)" style="padding:10px;color:#ccc;font-size:18px;">✕</div>

            `).join('');
            const listSec = document.getElementById('playlistSection');

        // --- 删除单曲逻辑 ---
        removeSong(index, event) {
            // 1. 阻止事件冒泡，防止点击删除时意外触发播放
            if (event) event.stopPropagation();

            // 2. 从数组中移除对应下标的歌曲
            if (index > -1) {
                this.playlist.splice(index, 1);
            }

            // 3. 同步到本地缓存，确保持久化
            localStorage.setItem('my_163_playlist', JSON.stringify(this.playlist));

            // 4. 重新渲染列表，让界面即时更新
            this.renderPlaylist();

            // 5. 如果删光了，可以顺手把列表关掉
            if (this.playlist.length === 0) {
                const listSec = document.getElementById('playlistSection');
                if (listSec) listSec.style.display = 'none';
            }
        },

async play(index) {
    if (!this.playlist[index]) return;
    this.currentIndex = index;
    const song = this.playlist[index];
    const cookie = localStorage.getItem('wyy_cookie') || "";
    
    try {
        const res = await fetch(`${this.API_BASE}/song/url?id=${song.id}&cookie=${encodeURIComponent(cookie)}`);
        const data = await res.json();
        const url = data.data[0].url;

        if (!url) {
            this.showMusicTips(`🚫 无版权: ${song.name}`);
            setTimeout(() => this.next(), 3000);
            return;
        }

        this.audio.src = url;
        
        // 关键：使用箭头函数保持 this 指向 MusicModule
        this.audio.play().then(() => {
            this.isPlaying = true;
            this.updateUI(song);
            this.closeSubPage(); 
            this.tellAIWatching(song); 
        }).catch(e => {
            // 拦截浏览器策略错误，不中断脚本
            if (e.name === 'NotAllowedError' || e.name === 'AbortError') {
                console.log("播放被拦截或中断");
                return; 
            }
            this.showMusicTips("播放出错，尝试下一首");
            setTimeout(() => this.next(), 2000); 
        });

    } catch (err) { 
        console.error("网络请求或逻辑错误:", err);
        this.showMusicTips("网络异常");
    }
},
    
updateUI(song) {
        const title = document.getElementById('floatTitle');
        const cover = document.getElementById('floatCover');
        const playBtn = document.getElementById('playBtn');
        const floatCD = document.getElementById('floatCD');

        if (title) title.innerText = song.name;
        if (cover) {
            cover.src = song.pic;
            // 确保动画重新开始
            cover.style.animation = "none"; 
            cover.offsetHeight; // 触发重绘
            cover.style.animation = "rotateCD 8s linear infinite";
            cover.style.animationPlayState = "running";
        }
        if (playBtn) playBtn.innerText = "⏸";
        if (floatCD) floatCD.classList.add('playing');
        
        const bar = document.getElementById('progressBar');
        if (bar) bar.style.width = '0%';
    }, // 记得确保这个函数后面有逗号，如果下面还有函数的话


// 打开歌单页
    openSubPage() {
        const subPage = document.getElementById('musicSubPage');
        const floatBar = document.getElementById('musicFloatBar');
        if (subPage) {
            subPage.style.display = 'flex'; // 显示歌单页
            if (floatBar) floatBar.style.display = 'none'; // --- 关键：隐藏浮窗 ---
        }
    },

    // 关闭歌单页（返回聊天界面）
    closeSubPage() {
        const subPage = document.getElementById('musicSubPage');
        const floatBar = document.getElementById('musicFloatBar');
        if (subPage) {
            subPage.style.display = 'none'; // 隐藏歌单页
            // --- 只有在有歌播放时，才重新显示浮窗 ---
            if (floatBar && this.audio.src) {
                floatBar.style.display = 'flex'; 
            }
        }
    },
    
    // 1. 补全上一首逻辑
    prev() { 
        if (this.playlist.length === 0) return;
        this.currentIndex = (this.currentIndex - 1 + this.playlist.length) % this.playlist.length; 
        this.play(this.currentIndex); 
    },

    // 2. 补全下一首逻辑
   next() { 
        if (this.playlist.length === 0) return;
        this.currentIndex = (this.currentIndex + 1) % this.playlist.length; 
        this.play(this.currentIndex); 
    },

    prev() { 
        if (this.playlist.length === 0) return;
        this.currentIndex = (this.currentIndex - 1 + this.playlist.length) % this.playlist.length; 
        this.play(this.currentIndex); 
    },
    // 3. 核心修复：播放/暂停切换逻辑
// 3. 核心修复：播放/暂停切换逻辑
    toggle() {
        if (!this.audio.src) {
            if (this.playlist.length > 0) this.play(0);
            return;
        }
        const playBtn = document.getElementById('playBtn');
        const floatCover = document.getElementById('floatCover');
        
        if (this.audio.paused) {
            this.audio.play().then(() => {
                this.isPlaying = true;
                if(playBtn) playBtn.innerText = "⏸";
                if(floatCover) {
                    floatCover.style.animation = "rotateCD 8s linear infinite";
                    floatCover.style.animationPlayState = "running";
                }
            });
        } else {
            this.audio.pause();
            this.isPlaying = false;
            if(playBtn) playBtn.innerText = "▶";
            if(floatCover) {
                floatCover.style.animationPlayState = "paused";
            }
        }
    } // 这里关掉 toggle
};
